name: CD — Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: europe-north1
  REGISTRY: europe-north1-docker.pkg.dev

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push backend image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/smhi-weather-app/backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: smhi-weather-backend
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/smhi-weather-app/backend:${{ github.sha }}
          flags: '--allow-unauthenticated --memory=1Gi --timeout=600'

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe smhi-weather-backend --region=${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push frontend image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/smhi-weather-app/frontend:${{ github.sha }}
          docker build \
            --build-arg VITE_API_URL=${{ steps.backend.outputs.url }}/api/v1 \
            -t $IMAGE ./frontend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: smhi-weather-frontend
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/smhi-weather-app/frontend:${{ github.sha }}
          flags: '--allow-unauthenticated'