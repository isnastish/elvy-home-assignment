services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8080"
    volumes:
      - ./backend/src:/code/src
      - ./backend/settings.yaml:/code/settings.yaml:ro
    environment:
      # Environment variables override settings.yaml values
      # Use double underscore (__) for nested settings: CORS__ORIGINS maps to cors.origins
      - CORS__ORIGINS=["http://localhost:3000","http://localhost:5173"]
      - SMHI__CACHE_TTL_HOURS=6
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:8080"
    depends_on:
      - backend
